<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinancePro — Criar Conta</title>
  <link rel="icon" href="img/profit_1838239.png" type="image/png">
  <link href="design-tokens.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>


<div class="auth-page">
  <div class="auth-brand">
    <div class="auth-brand-name">Finance<span>Pro</span></div>
    <div class="auth-brand-sub">Comece a controlar seu dinheiro hoje</div>
  </div>

  <div class="auth-card">
    <h2>Criar conta grátis</h2>
    <div class="auth-form">
      <div class="form-field">
        <label class="form-label">Nome</label>
        <input id="nome" type="text" placeholder="Seu nome">
      </div>
      <div class="form-field">
        <label class="form-label">E-mail</label>
        <input id="email" type="email" placeholder="seu@email.com">
      </div>
      <div class="form-field">
        <label class="form-label">Senha</label>
        <input id="senha" type="password" placeholder="••••••••">
      </div>
      <button onclick="register()" class="btn btn-primary">
        <i data-lucide="user-plus"></i> Criar Conta
      </button>
    </div>
    <div class="auth-link">
      Já tem conta? <a href="/login.html">Entrar</a>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="toast.js"></script>
<script src="auth.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
