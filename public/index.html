<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinancePro — Controle Financeiro</title>
  <link rel="icon" href="img/profit_1838239.png" type="image/png">
  <link href="./design-tokens.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ── SIDEBAR ───────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <i data-lucide="wallet"></i>
      <span class="sidebar-logo-text">Finance<span>Pro</span></span>
    </div>

    <nav>
      <a class="nav-item active" href="#dashboard">
        <i data-lucide="layout-dashboard"></i> Dashboard
      </a>
      <a class="nav-item" href="/calculadoras.html">
        <i data-lucide="calculator"></i> Calculadoras
      </a>
      <button class="nav-item" id="btnAbrirCategorias">
        <i data-lucide="folder-plus"></i> Categorias
      </button>
    </nav>

    <div class="sidebar-bottom">
      <button class="nav-item btn-danger" onclick="logout()" style="color: var(--red); border:none;">
        <i data-lucide="log-out"></i> Sair
      </button>
    </div>
  </aside>

  <!-- ── MAIN ──────────────────────────── -->
  <main class="main-content">

    <!-- Topbar -->
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:0.875rem;">
        <button class="btn btn-ghost btn-sm" id="btnToggleSidebar" style="display:none;" aria-label="Menu">
          <i data-lucide="menu"></i>
        </button>
        <div>
          <div class="topbar-title">Dashboard</div>
          <div class="topbar-subtitle" id="subtituloMes">Carregando...</div>
        </div>
      </div>
      <!-- Filtro de mês -->
      <div class="filter-bar">
        <label for="filtro-mes">
          <i data-lucide="calendar"></i> Período
        </label>
        <input type="month" id="filtro-mes">
      </div>
    </div>

    <!-- Cards resumo -->
    <section class="summary-grid">
      <div class="card card-green">
        <div class="card-title"><i data-lucide="trending-up"></i> Entradas</div>
        <div class="card-value green skeleton" id="total-entradas">R$ 0,00</div>
      </div>
      <div class="card card-red">
        <div class="card-title"><i data-lucide="trending-down"></i> Saídas</div>
        <div class="card-value red skeleton" id="total-saidas">R$ 0,00</div>
      </div>
      <div class="card card-blue">
        <div class="card-title"><i data-lucide="wallet"></i> Saldo</div>
        <div class="card-value skeleton" id="saldo">R$ 0,00</div>
      </div>
    </section>

    <!-- Formulário -->
    <div class="form-card">
      <div class="section-title"><i data-lucide="plus-circle"></i> Nova Transação</div>
      <form id="form-transacao">
        <div class="form-grid">
          <div class="form-field">
            <label class="form-label">Valor (R$)</label>
            <input type="text" id="valor" inputmode="decimal" pattern="[\d.,]*" placeholder="0,00">
          </div>
          <div class="form-field">
            <label class="form-label">Tipo</label>
            <select id="tipo">
              <option value="entrada">Entrada</option>
              <option value="saida">Saída</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">Categoria</label>
            <select id="categoria"></select>
          </div>
          <div class="form-field">
            <label class="form-label">Mês de referência</label>
            <input type="month" id="data" required>
          </div>
        </div>
        <div style="margin-top:1rem;text-align:right;">
          <button type="submit" class="btn btn-primary">
            <i data-lucide="plus-circle"></i> Adicionar Transação
          </button>
        </div>
      </form>
    </div>

    <!-- Tabela de transações -->
    <div class="card">
      <div class="section-title"><i data-lucide="list"></i> Transações do período</div>
      <div class="table-wrapper">
        <table class="fp-table">
          <thead>
            <tr>
              <th>Valor</th>
              <th>Tipo</th>
              <th>Categoria</th>
              <th>Mês</th>
              <th style="text-align:right">Ação</th>
            </tr>
          </thead>
          <tbody id="lista-transacoes"></tbody>
        </table>
      </div>
    </div>

    <!-- Gráficos -->
    <div class="chart-section">
      <div class="chart-header">
        <h2><i data-lucide="bar-chart-2"></i> Visualização de Dados</h2>
        <div class="chart-tabs" id="chart-selectors">
          <button class="chart-tab active" data-chart="bar"><i data-lucide="bar-chart-2"></i> Barras</button>
          <button class="chart-tab" data-chart="pie"><i data-lucide="pie-chart"></i> Pizza</button>
          <button class="chart-tab" data-chart="line"><i data-lucide="trending-up"></i> Linha</button>
        </div>
      </div>

      <div id="chart-bar-container" class="chart-container-item active">
        <div class="chart-canvas-wrap"><canvas id="graficoCombinado" role="img" aria-label="Gráfico de barras: entradas e saídas por categoria"></canvas></div>
      </div>
      <div id="chart-pie-container" class="chart-container-item">
        <div class="chart-canvas-wrap"><canvas id="graficoPizza" role="img" aria-label="Gráfico de pizza: distribuição de gastos por categoria"></canvas></div>
      </div>
      <div id="chart-line-container" class="chart-container-item">
        <div class="chart-canvas-wrap"><canvas id="graficoLinha" role="img" aria-label="Gráfico de linha: evolução de entradas, saídas e saldo por mês"></canvas></div>
      </div>
    </div>

    <!-- Metas -->
    <div class="metas-section">
      <div class="section-title"><i data-lucide="target"></i> Minhas Metas</div>
      <div class="metas-form-grid" style="margin-bottom:1.5rem;">
        <div class="form-field">
          <label class="form-label">Nome da Meta</label>
          <input type="text" id="nomeMeta" placeholder="Ex: Viagem, Reserva...">
        </div>
        <div class="form-field">
          <label class="form-label">Valor Objetivo (R$)</label>
          <input type="text" id="valorMeta" placeholder="0,00">
        </div>
        <div class="form-field">
          <label class="form-label">Valor Atual (R$)</label>
          <input type="text" id="valorAtualMeta" placeholder="0,00">
        </div>
        <div class="form-field">
          <label class="form-label">&nbsp;</label>
          <button id="btnAddMeta" class="btn btn-primary">
            <i data-lucide="plus"></i> Criar Meta
          </button>
        </div>
      </div>
      <div id="listaMetas" style="display:grid;gap:0.875rem;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));"></div>
    </div>

  </main>

  <!-- ── MODAL CATEGORIAS ───────────────── -->
  <div id="modalCategorias" class="modal-overlay" style="display:none;">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2><i data-lucide="folder"></i> Gerenciar Categorias</h2>
        <button id="btnFecharModal" class="btn btn-ghost btn-sm" aria-label="Fechar">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="modal-body">
        <!-- Form nova categoria -->
        <div class="card" style="background:var(--bg3);">
          <div class="section-title" id="tituloFormCategoria"><i data-lucide="plus-circle"></i> Nova Categoria</div>
          <form id="formCategoria">
            <input type="hidden" id="categoriaEditId">
            <div class="form-grid" style="margin-bottom:0.875rem;">
              <div class="form-field">
                <label class="form-label">Nome</label>
                <input type="text" id="inputNomeCategoria" placeholder="Nome da categoria" required>
              </div>
              <div class="form-field">
                <label class="form-label">Tipo</label>
                <select id="inputTipoCategoria" required>
                  <option value="">Selecione</option>
                  <option value="entrada">Entrada</option>
                  <option value="saida">Saída</option>
                </select>
              </div>
            </div>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
              <button type="submit" class="btn btn-primary btn-sm">
                <i data-lucide="save"></i> <span id="btnTextoSalvar">Criar Categoria</span>
              </button>
              <button type="button" id="btnCancelarEdicao" class="btn btn-ghost btn-sm" style="display:none;">
                Cancelar
              </button>
            </div>
          </form>
        </div>

        <!-- Lista categorias -->
        <div>
          <div class="section-title"><i data-lucide="list"></i> Suas categorias personalizadas</div>
          <div id="listaCategoriasUsuario" style="display:flex;flex-direction:column;gap:0.5rem;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script>
    if (!localStorage.getItem("token")) window.location.href = "/login.html";
    function logout() { localStorage.removeItem("token"); location.href = "/login.html"; }

    // Mobile sidebar toggle
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const btnToggle = document.getElementById('btnToggleSidebar');

    function checkMobile() {
      const mobile = window.innerWidth <= 768;
      btnToggle.style.display = mobile ? 'inline-flex' : 'none';
    }
    checkMobile();
    window.addEventListener('resize', checkMobile);

    btnToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
    });
    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    });

    // Atualiza subtítulo com mês atual
    function atualizarSubtitulo(mesValue) {
      const el = document.getElementById('subtituloMes');
      if (!mesValue) return;
      const [ano, mes] = mesValue.split('-');
      const nomes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
      el.textContent = nomes[parseInt(mes)-1] + ' de ' + ano;
    }
    document.getElementById('filtro-mes').addEventListener('change', e => atualizarSubtitulo(e.target.value));
  </script>

  <script src="toast.js"></script>
  <script src="script.js"></script>
  <script src="user_categories.js"></script>
  <script src="charts-manager.js"></script>
</body>
</html>
