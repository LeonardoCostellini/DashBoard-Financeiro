<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinancePro — Login</title>
  <link rel="icon" href="img/profit_1838239.png" type="image/png">
  <link href="design-tokens.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<script>if (localStorage.getItem("token")) window.location.href = "/";</script>

<div class="auth-page">
  <div class="auth-brand">
    <div class="auth-brand-name">Finance<span>Pro</span></div>
    <div class="auth-brand-sub">Controle suas finanças com inteligência</div>
  </div>

  <div class="auth-card">
    <h2>Entrar na sua conta</h2>
    <div class="auth-form">
      <div class="form-field">
        <label class="form-label">E-mail</label>
        <input id="email" type="email" placeholder="seu@email.com">
      </div>
      <div class="form-field">
        <label class="form-label">Senha</label>
        <input id="senha" type="password" placeholder="••••••••">
      </div>
      <button onclick="login()" class="btn btn-primary">
        <i data-lucide="log-in"></i> Entrar
      </button>
    </div>
    <div class="auth-link">
      Não tem conta? <a href="/register.html">Criar conta grátis</a>
    </div>
    <div class="auth-hint">Use qualquer e-mail e senha para testar</div>
  </div>
</div>

<div id="toast-container"></div>
<script src="toast.js"></script>
<script src="/auth.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
